<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevScout | Premium Open-Source</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="#" class="logo">DevScout.</a>
        <div class="nav-actions">
            <a href="https://github.com/shubhamsharma0707" target="_blank" class="nav-btn">My GitHub</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Discover Top <br>
            <span class="rolling-text-container">
                <span class="rolling-text">
                    <span>JavaScript</span>
                    <span>TypeScript</span>
                    <span>Python</span>
                    <span>Repositories</span>
                </span>
            </span>
        </h1>
        <p>Real-time analytics from the GitHub REST API.</p>
    </header>

    <section class="controls-wrapper">
        <input type="text" id="search-input" class="dark-input search-box" placeholder="Search keywords (e.g., react, node)...">
        
        <div class="dropdown-group">
            <select id="filter-language" class="dark-input">
                <option value="all">All Technologies</option>
                <option value="javascript">JavaScript</option>
                <option value="typescript">TypeScript</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="c++">C++</option>
                <option value="go">Go</option>
                <option value="rust">Rust</option>
            </select>

            <select id="sort-select" class="dark-input">
                <option value="stars-desc">Most Stars (Popularity)</option>
                <option value="stars-asc">Least Stars</option>
                <option value="issues-desc">Most Open Issues</option>
            </select>
        </div>
    </section>

    <main class="features-section">
        <div id="loading-msg" class="text-muted" style="text-align: center; font-size: 1.2rem;">
            Analyzing GitHub Data...
        </div>
        
        <div id="repo-container" class="bento-grid"></div>
    </main>

    <footer>
        <p class="footer-text">Created by Shubham Sharma | Powered by GitHub API</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
